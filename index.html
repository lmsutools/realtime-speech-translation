<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <!-- Recommended CSP for Electron -->
    <meta http-equiv="Content-Security-Policy" content="default-src 'self'; script-src 'self'; style-src 'self' 'unsafe-inline'; img-src 'self' data:;">
    <meta name="viewport" content="width=device-width,initial-scale=1">
    <title>ScribeFlow Translator</title>
    <link rel="stylesheet" href="./base.css">
    <link rel="stylesheet" href="./components.css">
    <link rel="stylesheet" href="./layout.css">
    <style>
       body {
           margin: 0;
           padding: 20px;
           font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
           background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
           min-height: 100vh;
           color: white;
       }
       
       .container {
           max-width: 800px;
           margin: 0 auto;
           background: rgba(255, 255, 255, 0.1);
           border-radius: 20px;
           padding: 30px;
           backdrop-filter: blur(10px);
           box-shadow: 0 8px 32px rgba(0, 0, 0, 0.1);
       }
       
       h1 {
           text-align: center;
           margin-bottom: 30px;
           font-size: 2.5em;
           text-shadow: 2px 2px 4px rgba(0, 0, 0, 0.3);
       }
       
       .controls {
           display: flex;
           gap: 15px;
           margin-bottom: 20px;
           flex-wrap: wrap;
           justify-content: center;
       }
       
       button {
           padding: 12px 24px;
           border: none;
           border-radius: 25px;
           font-size: 16px;
           font-weight: 600;
           cursor: pointer;
           transition: all 0.3s ease;
           background: rgba(255, 255, 255, 0.2);
           color: white;
           backdrop-filter: blur(5px);
       }
       
       button:hover {
           background: rgba(255, 255, 255, 0.3);
           transform: translateY(-2px);
           box-shadow: 0 4px 15px rgba(0, 0, 0, 0.2);
       }
       
       button:active {
           transform: translateY(0);
       }
       
       button:disabled {
           opacity: 0.5;
           cursor: not-allowed;
           transform: none;
       }
       
       .status {
           text-align: center;
           margin: 20px 0;
           font-size: 18px;
           font-weight: 500;
       }
       
       .output-section {
           margin-top: 30px;
       }
       
       .output-box {
           background: rgba(0, 0, 0, 0.2);
           border-radius: 15px;
           padding: 20px;
           margin: 15px 0;
           min-height: 100px;
           border: 1px solid rgba(255, 255, 255, 0.1);
       }
       
       .output-label {
           font-weight: 600;
           margin-bottom: 10px;
           color: #ffd700; /* Gold color for labels */
       }
       
       .output-text {
           font-size: 16px;
           line-height: 1.5;
           word-wrap: break-word;
       }
       
       .language-selector {
           margin: 20px 0;
           text-align: center;
       }
       
       select {
           padding: 10px 15px;
           border-radius: 15px;
           border: none;
           background: rgba(255, 255, 255, 0.2);
           color: white;
           font-size: 16px;
           backdrop-filter: blur(5px);
           margin: 0 10px;
       }
       
       select option {
           background: #333; /* Darker background for options */
           color: white;
       }
       
       .recording-indicator {
           display: none; /* Hidden by default */
           width: 20px;
           height: 20px;
           background: #ff4444; /* Bright red for recording */
           border-radius: 50%;
           animation: pulse 1.5s infinite;
           margin: 0 auto 20px; /* Centered above controls */
       }
       
       .recording-indicator.active {
           display: block; /* Show when active */
       }
       
       @keyframes pulse {
           0% { opacity: 1; transform: scale(1); }
           50% { opacity: 0.7; transform: scale(1.1); }
           100% { opacity: 1; transform: scale(1); }
       }
    </style>
</head>
<body>
    <div class="container">
        <h1>ScribeFlow Translator</h1>

        <div class="recording-indicator" id="recordingIndicator"></div>

        <div class="controls">
            <button id="startBtn">Start Recording</button>
            <button id="stopBtn" disabled>Stop Recording</button>
            <button id="clearBtn">Clear</button>
        </div>

        <div class="language-selector">
            <label for="sourceLanguage">From:</label>
            <select id="sourceLanguage">
                <option value="en">English</option>
                <option value="es">Spanish</option>
                <option value="fr">French</option>
                <option value="de">German</option>
                <option value="it">Italian</option>
                <option value="pt">Portuguese</option>
                <option value="ru">Russian</option>
                <option value="ja">Japanese</option>
                <option value="ko">Korean</option>
                <option value="zh">Chinese</option>
            </select>
            <label for="targetLanguage">To:</label>
            <select id="targetLanguage">
                <option value="es">Spanish</option>
                <option value="en">English</option>
                <option value="fr">French</option>
                <option value="de">German</option>
                <option value="it">Italian</option>
                <option value="pt">Portuguese</option>
                <option value="ru">Russian</option>
                <option value="ja">Japanese</option>
                <option value="ko">Korean</option>
                <option value="zh">Chinese</option>
            </select>
        </div>

        <div class="status" id="status">Ready to record</div>

        <div class="output-section">
            <div class="output-box">
                <div class="output-label">Original Text:</div>
                <div class="output-text" id="transcription">Transcription will appear here...</div>
            </div>
            <div class="output-box">
                <div class="output-label">Translation:</div>
                <div class="output-text" id="translation">Translation will appear here...</div>
            </div>
        </div>
    </div>

    <!-- Webpack bundle will be injected here by Webpack, or manually loaded -->
    <script src="./build/bundle.js"></script>
</body>
</html>
